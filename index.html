async function sbUpsert(url,key,log){
  if(!url||!key) return;
  const row = {
    id:log.id, secret:"tl_x7k9m2", date:log.date, type:log.type,
    label:log.label||"", duration:log.duration||null,
    distance:log.distance||null, notes:log.notes||"",
    pre_energy:log.preEnergy||null, pre_pain:log.prePain||null,
    pre_note:log.preNote||"", post_energy:log.postEnergy||null,
    post_note:log.postNote||"",
    data:JSON.stringify({
      sessionKey:log.sessionKey, blocks:log.blocks,
      dist:log.dist, fc:log.fc, fcMax:log.fcMax,
      swolf:log.swolf, kcal:log.kcal, feel:log.feel,
      ciatico:log.ciatico, source:log.source,
      // sueño
      sleepScore:log.sleepScore, hrRest:log.hrRest,
      bodyBatMorning:log.bodyBatMorning, spo2:log.spo2,
      hrv:log.hrv, sleepQuality:log.sleepQuality,
    })
  };
  try{
    await fetch(url+"/rest/v1/trainlog",{method:"POST",
      headers:{"Content-Type":"application/json","apikey":key,"Authorization":"Bearer "+key,"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify(row)});
  }catch(e){console.error("SB upsert:",e);}
}
async function sbDelete(url,key,id){
  if(!url||!key) return;
  await fetch(url+"/rest/v1/trainlog?id=eq."+id,{method:"DELETE",
    headers:{"apikey":key,"Authorization":"Bearer "+key}}).catch(()=>{});
}
async function sbFetch(url,key){
  if(!url||!key) return null;
  try{
    const r = await fetch(url+"/rest/v1/trainlog?order=date.desc&limit=500&type=neq.config",
      {headers:{"apikey":key,"Authorization":"Bearer "+key}});
    const d = await r.json();
    if(!Array.isArray(d)) return null;
    return d.map(row=>{
      let p={};
      try{p=JSON.parse(row.data||"{}");}catch{}
      return {
        id:row.id, date:row.date, type:row.type, label:row.label,
        duration:row.duration, distance:row.distance, notes:row.notes,
        preEnergy:row.pre_energy, prePain:row.pre_pain, preNote:row.pre_note,
        postEnergy:row.post_energy, postNote:row.post_note,
        sessionKey:p.sessionKey, blocks:p.blocks,
        dist:p.dist, fc:p.fc, fcMax:p.fcMax,
        swolf:p.swolf, kcal:p.kcal, feel:p.feel,
        ciatico:p.ciatico, source:p.source,
        sleepScore:p.sleepScore, hrRest:p.hrRest,
        bodyBatMorning:p.bodyBatMorning, spo2:p.spo2,
        hrv:p.hrv, sleepQuality:p.sleepQuality,
      };
    });
  }catch{return null;}
}

// ── PARSERS GARMIN ────────────────────────────────────────────
function parseGarminCSV(text){
  const lines = text.trim().split("\n");
  if(lines.length<2) return [];
  const headers = lines[0].split(",").map(h=>h.trim().replace(/^\uFEFF/,""));
  const idx={};headers.forEach((h,i)=>{idx[h]=i;});
  const SWIM={"Natación":"swimming","Natación en piscina":"swimming","Piscina":"swimming","Open Water":"swimming"};
  const results=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim();if(!line)continue;
    const cols=[];let cur="",inQ=false;
    for(let c=0;c<line.length;c++){
      const ch=line[c];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    const g=name=>(cols[idx[name]]||"").replace(/"/g,"").trim();
    const tipo=g("Tipo de actividad");
    const fechaStr=g("Fecha");
    const fecha=fechaStr.slice(0,10);
    const titulo=g("Título")||tipo;
    const cal=parseInt(g("Calorías").replace(/,/g,""))||null;
    const dist=parseFloat(g("Distancia").replace(/,/g,""))||null;
    const tiempoStr=g("Tiempo");
    let durMin=null;
    if(tiempoStr){const tp=tiempoStr.split(":").map(Number);if(tp.length>=2)durMin=Math.round(tp[0]*60+tp[1]+(tp[2]||0)/60);}
    const fcMedia=parseInt(g("Frecuencia cardiaca media"))||null;
    const fcMax2=parseInt(g("FC máxima"))||null;
    const uid="garmin_"+fechaStr.replace(/[^0-9]/g,"");
    const isSwim=!!SWIM[tipo];
    const notes=[];
    if(fcMedia)notes.push("FC media: "+fcMedia+" lpm");
    if(fcMax2)notes.push("FC máx: "+fcMax2+" lpm");
    if(cal)notes.push("Calorías: "+cal+" kcal");
    if(dist&&isSwim)notes.push("Distancia: "+(dist*1000|0)+" m");
    results.push({
      id:uid,date:fecha,type:isSwim?"swimming":"activity",
      label:titulo,duration:durMin,
      distance:isSwim?Math.round(dist*1000):dist,
      fc:fcMedia,fcMax:fcMax2,kcal:cal,
      notes:notes.join(" · "),source:"garmin",
    });
  }
  return results;
}

function parseGarminSleep(text){
  const lines=text.trim().split("\n");
  if(lines.length<2) return [];
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^\uFEFF/,"").replace(/"/g,""));
  const idx={};headers.forEach((h,i)=>{idx[h]=i;});
  const results=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim();if(!line)continue;
    const cols=line.split(",").map(c=>c.trim().replace(/"/g,""));
    const g=name=>{const i2=idx[name];return i2!=null?(cols[i2]||"").trim():"";};
    const fecha=cols[0].trim().replace(/"/g,"");
    if(!fecha||!fecha.match(/^\d{4}-\d{2}-\d{2}$/))continue;
    const score=parseInt(g("Puntuación"))||null;
    const hrRest=parseInt(g("Frecuencia cardiaca en reposo"))||null;
    const bodyBat=parseInt(g("Body Battery"))||null;
    const spo2=parseFloat(g("Pulsioximetría"))||null;
    const hrv=parseInt(g("Estado de VFC"))||null;
    const calidad=g("Calidad")||null;
    const horaDormir=g("Hora de dormir")||null;
    const horaDespertar=g("Hora de despertarte")||null;
    const durStr=g("Duración")||"";
    let durMin=null;
    const mH=durStr.match(/(\d+)h/);const mM=durStr.match(/(\d+)min/);
    if(mH||mM)durMin=(mH?parseInt(mH[1])*60:0)+(mM?parseInt(mM[1]):0);
    const necesidad=g("Necesidad de sueño")||null;
    results.push({
      id:"sleep_"+fecha,date:fecha,type:"sleep",label:"Sueño",
      duration:durMin,sleepScore:score,hrRest,bodyBatMorning:bodyBat,
      spo2,hrv,sleepQuality:calidad,bedTime:horaDormir,wakeTime:horaDespertar,
      sleepNeed:necesidad,
      notes:[calidad&&"Calidad: "+calidad,score&&"Score: "+score,
             durMin&&Math.floor(durMin/60)+"h"+(durMin%60)+"m",
             hrRest&&"FC reposo: "+hrRest,bodyBat&&"BB: "+bodyBat].filter(Boolean).join(" · "),
      source:"garmin_sleep",
    });
  }
  return results;
}

// ── UTILS ────────────────────────────────────────────────────
function today(){
  const d=new Date();
  const local=new Date(d.getTime()-180*60000);
  return local.toISOString().slice(0,10);
}
function fmtDate(iso){
  return new Date(iso+"T12:00:00").toLocaleDateString("es-AR",{weekday:"short",day:"2-digit",month:"short"});
}
function fmtDateLong(iso){
  const d=new Date(iso+"T12:00:00");
  const dias=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  return dias[d.getDay()]+" "+d.getDate()+" de "+meses[d.getMonth()];
}
function pad2(n){return String(n).padStart(2,"0");}
function isoDay(y,m,d){return y+"-"+pad2(m+1)+"-"+pad2(d);}

        const bg=isSwim?C.poolBg:isDry?C.dryBg:"#f5f5f5";
        return <div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<arr.length-1?"1px solid "+C.border:"none"}}>
          <div style={{width:38,height:38,borderRadius:10,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
            {isSwim?"🏊":isDry?"💪":"⚡"}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:"600"}}>{l.label}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>
              {fmtDate(l.date)}
              {l.dist||l.distance?" · "+(l.dist||l.distance)+"m":""}
              {l.duration?" · "+l.duration+"min":""}
              {l.feel?<span style={{marginLeft:8}}>{FEEL_ICONS[l.feel]||""}</span>:""}
            </div>
          </div>
          {l.swolf&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:C.muted}}>SWOLF</div>
            <div style={{fontSize:16,fontWeight:"800",color:col}}>{l.swolf}</div>
          </div>}
        </div>;
      })}
    </div>}
  </div>;
}

// ── PROGRESO ─────────────────────────────────────────────────
function Progress({logs,addLog,sbUrl,sbKey}){
  const [pesoInput,setPesoInput] = useState("");
  const [pesoDate,setPesoDate] = useState(today());
  const [pesoSaved,setPesoSaved] = useState(false);
  const [importResult,setImportResult] = useState(null);
  const [importLoading,setImportLoading] = useState(false);
  const [importType,setImportType] = useState(null);
  const fileRef = useRef(null);

  const pesoLogs = logs.filter(l=>l.type==="peso").sort((a,b)=>b.date.localeCompare(a.date));
  const sleepLogs = logs.filter(l=>l.type==="sleep").sort((a,b)=>b.date.localeCompare(a.date));
  const swimLogs = logs.filter(l=>l.type==="swimming").sort((a,b)=>b.date.localeCompare(a.date));

  function savePeso(){
    if(!pesoInput||isNaN(pesoInput)) return;
    addLog({id:"peso_"+pesoDate,date:pesoDate,type:"peso",label:"Peso",distance:parseFloat(pesoInput),notes:pesoInput+" kg"});
    setPesoSaved(true);setTimeout(()=>setPesoSaved(false),2000);setPesoInput("");
  }

  function handleFile(e){
    const file=e.target.files&&e.target.files[0];
    if(!file) return;
    setImportLoading(true);setImportResult(null);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed = importType==="sleep"?parseGarminSleep(ev.target.result):parseGarminCSV(ev.target.result);
        const existingIds=new Set(logs.map(l=>l.id));
        const nuevas=parsed.filter(p=>!existingIds.has(p.id));
        setImportResult({nuevas,duplicadas:parsed.length-nuevas.length,total:parsed.length,type:importType});
        setImportLoading(false);
      }catch(err){setImportResult({error:err.message});setImportLoading(false);}
    };
    reader.readAsText(file,"UTF-8");
  }
  function confirmarImport(){
    if(!importResult?.nuevas) return;
    importResult.nuevas.forEach(l=>addLog(l));
    setImportResult({...importResult,done:true});
    if(fileRef.current)fileRef.current.value="";
  }

  // Últimos 500m registrados
  const last500 = swimLogs.find(l=>l.notes?.includes("500m")||l.sessionKey==="500m");

  return <div>
    {/* Peso */}
    <div style={{...st.card,borderLeft:"4px solid "+C.green}}>
      <div style={{fontSize:10,color:C.green,fontWeight:"700",letterSpacing:1,marginBottom:12}}>⚖️ REGISTRO DE PESO</div>
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"flex-end"}}>
        <div style={{flex:1}}>
          <label style={st.lbl}>PESO (kg)</label>
          <input type="number" step="0.1" value={pesoInput} onChange={e=>setPesoInput(e.target.value)} style={st.inp} placeholder="78.4"/>
        </div>
        <div style={{flex:1}}>
          <label style={st.lbl}>FECHA</label>
          <input type="date" value={pesoDate} onChange={e=>setPesoDate(e.target.value)} style={st.inp}/>
        </div>
        <button onClick={savePeso} style={{background:pesoSaved?C.green:C.pool,color:"#fff",border:"none",borderRadius:10,padding:"11px 16px",cursor:"pointer",fontSize:13,fontWeight:"700",flexShrink:0,height:44}}>{pesoSaved?"✓":"+"}</button>
      </div>

      {/* Objetivo */}
      <div style={{background:C.greenBg,borderRadius:10,padding:"10px 14px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,color:C.green,fontWeight:"700"}}>OBJETIVO JUNIO 2026</div>
            <div style={{fontSize:18,fontWeight:"800",color:C.green}}>74-75 kg</div>
          </div>
          {pesoLogs[0]&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:C.muted}}>Actual</div>
            <div style={{fontSize:22,fontWeight:"800",color:C.pool}}>{pesoLogs[0].distance} kg</div>
            <div style={{fontSize:11,color:C.orange}}>faltan ~{Math.max(0,(pesoLogs[0].distance-74.5)).toFixed(1)} kg</div>
          </div>}
        </div>
      </div>

      {/* Historial peso */}
      {pesoLogs.slice(0,8).map((p,i,arr)=>{
        const prev=arr[i+1];
        const diff=prev?(p.distance-prev.distance):null;
        return <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<arr.length-1?"1px solid "+C.border:"none"}}>
          <div style={{fontSize:12,color:C.muted}}>{fmtDate(p.date)}</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            {diff!==null&&<div style={{fontSize:11,color:diff<0?C.green:C.red,fontWeight:"700"}}>{diff<0?"▼":"▲"} {Math.abs(diff).toFixed(1)} kg</div>}
            <div style={{fontSize:18,fontWeight:"800",color:C.text}}>{p.distance} kg</div>
          </div>
        </div>;
      })}
    </div>

    {/* Métricas pileta */}
    {swimLogs.length>0&&<div style={st.card}>
      <div style={{fontSize:10,color:C.pool,fontWeight:"700",letterSpacing:1,marginBottom:12}}>🏊 MÉTRICAS PILETA</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[
          {label:"Sesiones",v:swimLogs.length},
          {label:"Dist. total",v:(swimLogs.reduce((s,l)=>s+(l.dist||l.distance||0),0)/1000).toFixed(1)+"km"},
          {label:"SWOLF base",v:swimLogs.find(l=>l.swolf)?.swolf||"—"},
        ].map((x,i)=><div key={i} style={{background:C.poolBg,borderRadius:10,padding:"12px 8px",textAlign:"center"}}>
          <div style={{fontSize:18,fontWeight:"800",color:C.pool}}>{x.v}</div>
          <div style={{fontSize:9,color:C.muted,fontWeight:"700",marginTop:2}}>{x.label}</div>
        </div>)}
      </div>
      {/* Últimas sesiones */}
      {swimLogs.slice(0,5).map((l,i,arr)=><div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<arr.length-1?"1px solid "+C.border:"none"}}>
        <div>
          <div style={{fontSize:12,fontWeight:"600"}}>{l.label||l.sessionKey}</div>
          <div style={{fontSize:11,color:C.muted}}>{fmtDate(l.date)}</div>
        </div>
        <div style={{display:"flex",gap:12,fontSize:12}}>
          {(l.dist||l.distance)&&<span style={{color:C.pool,fontWeight:"700"}}>{l.dist||l.distance}m</span>}
          {l.swolf&&<span style={{color:C.orange,fontWeight:"700"}}>SW{l.swolf}</span>}
          {l.fc&&<span style={{color:C.red}}>♥{l.fc}</span>}
        </div>
      </div>)}
    </div>}

    {/* Sueño */}
    {sleepLogs.length>0&&<div style={st.card}>
      <div style={{fontSize:10,color:C.purple,fontWeight:"700",letterSpacing:1,marginBottom:12}}>😴 SUEÑO RECIENTE</div>
      {sleepLogs.slice(0,7).map((s,i,arr)=>{
        const QUAL_COLORS={"Excelente":C.green,"Bueno":"#0277bd","Aceptable":C.orange,"Deficiente":C.red};
        const qc=QUAL_COLORS[s.sleepQuality]||C.muted;
        return <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<arr.length-1?"1px solid "+C.border:"none"}}>
          <div>
            <div style={{fontSize:12,fontWeight:"600"}}>{fmtDate(s.date)}</div>
            {s.sleepQuality&&<div style={{fontSize:11,color:qc,fontWeight:"700"}}>{s.sleepQuality}</div>}
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {s.duration&&<span style={{fontSize:12,color:C.muted}}>{Math.floor(s.duration/60)}h{s.duration%60}m</span>}
            {s.sleepScore&&<span style={{fontSize:18,fontWeight:"800",color:qc}}>{s.sleepScore}</span>}
            {s.bodyBatMorning&&<span style={{fontSize:12,color:C.pool,fontWeight:"700"}}>BB{s.bodyBatMorning}</span>}
          </div>
        </div>;
      })}
    </div>}

    {/* Importar Garmin */}
    <div style={{...st.card,borderLeft:"4px solid "+C.pool}}>
      <div style={{fontSize:10,color:C.pool,fontWeight:"700",letterSpacing:1,marginBottom:10}}>⌚ IMPORTAR CSV DEL GARMIN</div>
      <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{display:"none"}} id="garmin-import"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <label htmlFor="garmin-import" onClick={()=>setImportType("activity")} style={{...st.btn,background:C.pool,display:"block",textAlign:"center",cursor:"pointer",fontSize:12,padding:"12px 8px"}}>📊 Actividades</label>
        <label htmlFor="garmin-import" onClick={()=>setImportType("sleep")} style={{...st.btn,background:C.purple,display:"block",textAlign:"center",cursor:"pointer",fontSize:12,padding:"12px 8px"}}>😴 Sueño</label>
      </div>
      <div style={{fontSize:11,color:C.muted,lineHeight:1.7}}>
        <strong>Actividades:</strong> connect.garmin.com → Actividades → Exportar CSV<br/>
        <strong>Sueño:</strong> connect.garmin.com → Salud → Sueño → Exportar CSV
      </div>
      {importLoading&&<div style={{color:C.muted,fontSize:12,marginTop:10,textAlign:"center"}}>Leyendo archivo...</div>}
      {importResult&&!importResult.error&&!importResult.done&&<div style={{marginTop:10}}>
        <div style={{background:C.poolBg,borderRadius:10,padding:"10px 14px",marginBottom:10}}>
          <div style={{fontSize:12}}>Total: <strong>{importResult.total}</strong> · Nuevas: <strong style={{color:C.green}}>{importResult.nuevas.length}</strong> · Ya existían: <strong style={{color:C.muted}}>{importResult.duplicadas}</strong></div>
        </div>
        {importResult.nuevas.length>0&&<button onClick={confirmarImport} style={{...st.btn}}>IMPORTAR {importResult.nuevas.length} {importResult.type==="sleep"?"NOCHES":"ACTIVIDADES"}</button>}
      </div>}
      {importResult?.done&&<div style={{color:C.green,fontWeight:"700",fontSize:13,marginTop:10,textAlign:"center"}}>✅ Importado correctamente</div>}
      {importResult?.error&&<div style={{color:C.red,fontSize:12,marginTop:10}}>{importResult.error}</div>}
    </div>
    <div style={{height:20}}/>
  </div>;
}

// ── CONFIGURACIÓN ─────────────────────────────────────────────
function Settings({sbUrl,setSbUrl,sbKey,setSbKey,logs}){
  const [su,setSu] = useState(sbUrl);
  const [sk,setSk] = useState(sbKey);
  const [saved,setSaved] = useState(false);

  function save(){setSbUrl(su);setSbKey(sk);ls.s("tl-sb-url",su);ls.s("tl-sb-key",sk);setSaved(true);setTimeout(()=>setSaved(false),2000);}

  function exportCSV(){
    const rows=[["Fecha","Tipo","Sesión","Distancia","Duración","FC","FC Máx","SWOLF","kcal","Cómo me sentí","Ciático","Notas"]];
    logs.filter(l=>l.type!=="sleep"&&l.type!=="config").forEach(l=>rows.push([
      l.date,l.type,l.label||"",l.dist||l.distance||"",l.duration||"",
      l.fc||"",l.fcMax||"",l.swolf||"",l.kcal||"",l.feel||"",l.ciatico||0,l.notes||""
    ]));
    const c=rows.map(r=>r.map(v=>'"'+v+'"').join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8;"}));a.download="trainlog_"+today()+".csv";a.click();
  }

  return <div>
    {/* Supabase */}
    <div style={{...st.card,borderLeft:"4px solid "+C.pool}}>
      <div style={{fontSize:10,color:C.pool,fontWeight:"700",letterSpacing:1,marginBottom:12}}>☁️ SUPABASE · SINCRONIZACIÓN</div>
      <div style={{marginBottom:10}}>
        <label style={st.lbl}>PROJECT URL</label>
        <input value={su} onChange={e=>setSu(e.target.value)} style={st.inp} placeholder="https://xxxx.supabase.co"/>
      </div>
      <div style={{marginBottom:14}}>
        <label style={st.lbl}>ANON KEY</label>
        <input type="password" value={sk} onChange={e=>setSk(e.target.value)} style={st.inp} placeholder="eyJhbGci..."/>
      </div>
      <button onClick={save} style={{...st.btn,background:saved?C.green:C.pool,marginBottom:10}}>{saved?"✓ GUARDADO":"GUARDAR"}</button>
      {su&&sk&&<button onClick={()=>fetch(su+"/rest/v1/trainlog?select=count",{headers:{"apikey":sk,"Authorization":"Bearer "+sk,"Prefer":"count=exact"}}).then(r=>r.ok?alert("✅ Conexión OK"):alert("❌ Error "+r.status)).catch(e=>alert("❌ "+e.message))} style={{...st.ghost,width:"100%",textAlign:"center",fontSize:12}}>VERIFICAR CONEXIÓN</button>}
    </div>

    {/* Stats */}
    <div style={st.card}>
      <div style={{fontSize:10,color:C.muted,fontWeight:"700",letterSpacing:1,marginBottom:10}}>ESTADÍSTICAS</div>
      {[
        {l:"Total actividades",v:logs.filter(l=>l.type!=="sleep").length},
        {l:"Sesiones de pileta",v:logs.filter(l=>l.type==="swimming").length},
        {l:"Sesiones en seco",v:logs.filter(l=>l.type==="home").length},
        {l:"Noches de sueño",v:logs.filter(l=>l.type==="sleep").length},
      ].map((x,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border,fontSize:13}}>
        <span style={{color:C.muted}}>{x.l}</span>
        <span style={{fontWeight:"700"}}>{x.v}</span>
      </div>)}
    </div>

    {/* Export */}
    <div style={st.card}>
      <div style={{fontSize:10,color:C.muted,fontWeight:"700",letterSpacing:1,marginBottom:10}}>EXPORTAR DATOS</div>
      <button onClick={exportCSV} style={{...st.ghost,width:"100%",textAlign:"center"}}>EXPORTAR CSV PARA GOOGLE SHEETS</button>
    </div>

    {/* Info */}
    <div style={{...st.card,background:"#fff8e1",borderColor:C.orange+"44"}}>
      <div style={{fontSize:10,color:C.orange,fontWeight:"700",letterSpacing:1,marginBottom:8}}>⚠️ CIÁTICO — RECORDATORIO</div>
      <div style={{fontSize:12,color:C.text,lineHeight:1.7}}>Si sentís hormigueo hacia la pierna: <strong>pará inmediatamente</strong>. La natación es el deporte más seguro. Siempre calentá antes de entrar al agua.</div>
    </div>

    {/* Reset PIN */}
    <div style={st.card}>
      <div style={{fontSize:10,color:C.muted,fontWeight:"700",letterSpacing:1,marginBottom:8}}>🔒 ACCESO</div>
      <button onClick={()=>{ls.s("tl-pin-v2","");window.location.reload();}} style={{...st.ghost,width:"100%",textAlign:"center",color:C.red,borderColor:C.red+"55",fontSize:12}}>CERRAR SESIÓN / CAMBIAR PIN</button>
    </div>

    {/* Install */}
    <div style={{...st.card,background:C.poolBg,borderColor:C.pool+"33"}}>
      <div style={{fontSize:10,color:C.pool,fontWeight:"700",letterSpacing:1,marginBottom:8}}>📱 INSTALAR COMO APP</div>
      <div style={{fontSize:12,color:C.text,lineHeight:1.8}}>
        <strong>Android (Chrome):</strong> menú ⋮ → "Agregar a pantalla de inicio"<br/>
        <strong>iPhone (Safari):</strong> compartir □ → "Añadir a pantalla de inicio"
      </div>
    </div>
    <div style={{height:20}}/>
  </div>;
}

// ── PIN LOCK ─────────────────────────────────────────────────
function PinLock({onUnlock}){
  const [pin,setPin] = useState("");
  const saved = ls.g("tl-pin-v2")||"";
  const [step,setStep] = useState(saved?"enter":"create");
  const [confirm,setConfirm] = useState("");
  const [error,setError] = useState("");

  function press(d){
    if(d==="del")setPin(p=>p.slice(0,-1));
    else if(pin.length<6)setPin(p=>p+d);
  }
  function handleAction(){
    if(step==="enter"){
      if(pin===saved){sessionStorage.setItem("tl-ok","1");onUnlock();}
      else{setError("PIN incorrecto");setPin("");}
    } else if(step==="create"){
      if(pin.length<4){setError("Mínimo 4 dígitos");return;}
      setConfirm(pin);setStep("confirm");setPin("");setError("");
    } else {
      if(pin!==confirm){setError("No coinciden");setPin("");return;}
      ls.s("tl-pin-v2",pin);sessionStorage.setItem("tl-ok","1");onUnlock();
    }
  }

  const keys=[["1","2","3"],["4","5","6"],["7","8","9"],["","0","del"]];
  return <div style={{minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
    <div style={{color:C.pool,fontSize:28,fontWeight:"800",letterSpacing:4,marginBottom:8}}>TRAINLOG</div>
    <div style={{color:C.muted,fontSize:11,letterSpacing:2,marginBottom:40,fontWeight:"700"}}>
      {step==="enter"?"INGRESÁ TU PIN":step==="create"?"CREAR PIN":"CONFIRMAR PIN"}
    </div>
    <div style={{display:"flex",gap:14,marginBottom:32}}>
      {Array.from({length:6},(_,i)=><div key={i} style={{width:13,height:13,borderRadius:"50%",background:i<pin.length?C.pool:C.border,transition:"background 0.1s"}}/>)}
    </div>
    {error&&<div style={{color:C.red,fontSize:12,marginBottom:16,fontWeight:"600"}}>{error}</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:12,marginBottom:32}}>
      {keys.map((row,ri)=>row.map((k,ki)=>k===""?<div key={ki}/>:<button key={ki} onClick={()=>press(k)} style={{width:72,height:72,borderRadius:"50%",background:k==="del"?"transparent":"#f5f5f5",border:"none",fontSize:k==="del"?22:24,fontWeight:"600",cursor:"pointer",color:k==="del"?C.muted:C.text}}>{k==="del"?"⌫":k}</button>))}
    </div>
    <button onClick={handleAction} disabled={pin.length<4} style={{...st.btn,width:200,opacity:pin.length<4?0.4:1,borderRadius:30}}>
      {step==="enter"?"ENTRAR":step==="create"?"SIGUIENTE":"CONFIRMAR"}
    </button>
    {step==="enter"&&<button onClick={()=>{ls.s("tl-pin-v2","");setStep("create");setPin("");setError("");}} style={{background:"none",border:"none",color:C.muted,fontSize:11,marginTop:20,cursor:"pointer"}}>Cambiar PIN</button>}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [unlocked,setUnlocked] = useState(()=>!!sessionStorage.getItem("tl-ok"));
  const [tab,setTab] = useState("home");
  const [logs,setLogs] = useState(()=>(ls.g("tl-lv5")||[]).filter(l=>l.type!=="config"));
  const [sbUrl,setSbUrl] = useState(()=>ls.g("tl-sb-url")||"");
  const [sbKey,setSbKey] = useState(()=>ls.g("tl-sb-key")||"");

  useEffect(()=>{ls.s("tl-lv5",logs);},[logs]);

  // Sync Supabase
  useEffect(()=>{
    if(!sbUrl||!sbKey) return;
    sbFetch(sbUrl,sbKey).then(remote=>{
      setLogs(prev=>{
        if(!remote||!remote.length) return prev;
        const remoteIds=new Set(remote.map(r=>r.id));
        prev.forEach(l=>{if(!remoteIds.has(l.id))sbUpsert(sbUrl,sbKey,l);});
        const localIds=new Set(prev.map(l=>l.id));
        const merged=[...prev,...remote.filter(r=>!localIds.has(r.id))];
        merged.sort((a,b)=>b.date.localeCompare(a.date));
        return merged;
      });
    }).catch(console.error);
  },[sbUrl,sbKey]);

  function addLog(l){
    const nl={...l};
    setLogs(p=>[nl,...p.filter(x=>x.id!==nl.id)]);
    sbUpsert(sbUrl,sbKey,nl);
  }

  const TAB_TITLES={home:"INICIO",swim:"NADAR",dry:"SECO EN CASA",progress:"PROGRESO",settings:"CONFIGURACIÓN"};

  if(!unlocked) return <PinLock onUnlock={()=>setUnlocked(true)}/>;

  return <div style={{background:C.bg,color:C.text,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:70}}>
    <Header title={TAB_TITLES[tab]} sub={tab==="home"?today():null}/>
    <div style={{padding:"14px 14px 0"}}>
      {tab==="home"&&<Home logs={logs} setTab={setTab}/>}
      {tab==="swim"&&<SwimLog logs={logs} addLog={addLog}/>}
      {tab==="dry"&&<DryLog logs={logs} addLog={addLog}/>}
      {tab==="progress"&&<Progress logs={logs} addLog={addLog} sbUrl={sbUrl} sbKey={sbKey}/>}
      {tab==="settings"&&<Settings sbUrl={sbUrl} setSbUrl={setSbUrl} sbKey={sbKey} setSbKey={setSbKey} logs={logs}/>}
    </div>
    <Nav tab={tab} set={setTab}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
